<!DOCTYPE html>
<html>
<head>
    <title>管理员后台</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/css/bootstrap.min.css">
</head>
<body>
    <nav class="navbar navbar-expand-lg navbar-dark bg-dark">
        <div class="container">
            <a class="navbar-brand" href="/">图书商城管理</a>
            <div class="navbar-nav ms-auto">
                <a class="nav-link" href="/dashboard">首页</a>
                <a class="nav-link" href="/users">用户管理</a>
                <a class="nav-link" href="/books">书籍管理</a>
                <a class="nav-link" href="/orders">订单管理</a>
                <a class="nav-link" href="/comments">评价管理</a>
                <a class="nav-link" href="/feedback">反馈管理</a>
                <a class="nav-link" href="/change_password">修改密码</a>
                <a class="nav-link" href="/logout">退出登录</a>
            </div>
        </div>
    </nav>

    <div class="container mt-4">
        <div class="row">
            <div class="col-md-6 mb-4">
                <div class="card">
                    <div class="card-body">
                        <h5 class="card-title">用户统计</h5>
                        <p class="card-text">总用户数: {{ user_count }}</p>
                    </div>
                </div>
            </div>
            <div class="col-md-6 mb-4">
                <div class="card">
                    <div class="card-body">
                        <h5 class="card-title">书籍统计</h5>
                        <p class="card-text">总书籍数: {{ book_count }}</p>
                    </div>
                </div>
            </div>
            <div class="col-md-6 mb-4">
                <div class="card">
                    <div class="card-body">
                        <h5 class="card-title">订单统计</h5>
                        <p class="card-text">总订单数: {{ order_count }}</p>
                    </div>
                </div>
            </div>
            <div class="col-md-6 mb-4">
                <div class="card">
                    <div class="card-body">
                        <h5 class="card-title">评价统计</h5>
                        <p class="card-text">总评价数: {{ comment_count }}</p>
                    </div>
                </div>
            </div>
            <div class="col-md-6 mb-4">
                <div class="card">
                    <div class="card-body">
                        <h5 class="card-title">反馈统计</h5>
                        <p class="card-text">总反馈数: {{ feedback_count }}</p>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
