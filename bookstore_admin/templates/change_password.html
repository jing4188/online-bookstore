<!DOCTYPE html>
<html>
<head>
    <title>修改密码</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/css/bootstrap.min.css">
</head>
<body>
    <nav class="navbar navbar-expand-lg navbar-dark bg-dark">
        <div class="container">
            <a class="navbar-brand" href="/">图书商城管理</a>
            <div class="navbar-nav ms-auto">
                <a class="nav-link" href="/dashboard">首页</a>
                <a class="nav-link" href="/users">用户管理</a>
                <a class="nav-link" href="/books">书籍管理</a>
                <a class="nav-link" href="/orders">订单管理</a>
                <a class="nav-link" href="/comments">评价管理</a>
                <a class="nav-link" href="/feedback">反馈管理</a>
                <a class="nav-link" href="/change_password">修改密码</a>
                <a class="nav-link" href="/logout">退出登录</a>
            </div>
        </div>
    </nav>

    <div class="container mt-4">
        <h2>修改密码</h2>
        
        <form method="post" action="/change_password">
            <div class="mb-3">
                <label for="new_password" class="form-label">新密码</label>
                <input type="password" class="form-control" id="new_password" name="new_password" required>
            </div>
            <div class="mb-3">
                <label for="confirm_password" class="form-label">确认新密码</label>
                <input type="password" class="form-control" id="confirm_password" name="confirm_password" required>
            </div>
            <button type="submit" class="btn btn-primary">修改密码</button>
            <a href="/dashboard" class="btn btn-secondary">返回首页</a>
        </form>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
