<!DOCTYPE html>
<html>
<head>
    <title>管理员控制面板</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/css/bootstrap.min.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        .feature-card {
            transition: transform 0.3s ease, box-shadow 0.3s ease;
            border-radius: 10px;
            overflow: hidden;
            box-shadow: 0 4px 6px rgba(0, 0, 0, 0.1);
        }
        .feature-card:hover {
            transform: translateY(-5px);
            box-shadow: 0 10px 20px rgba(0, 0, 0, 0.1);
        }
        .card-title {
            font-weight: 700;
            color: #333;
        }
        .list-group-item {
            padding: 12px 15px;
            border-radius: 8px;
            margin-bottom: 8px;
            background-color: #f8f9fa;
            border-left: 4px solid #007bff;
        }
        .list-group-item:hover {
            background-color: #e9ecef;
        }
        .btn-icon {
            display: inline-flex;
            align-items: center;
            gap: 8px;
        }
        .header-section {
            text-align: center;
            margin-bottom: 40px;
        }
        .header-title {
            font-size: 2.5rem;
            font-weight: 800;
            color: #2c3e50;
            margin-bottom: 15px;
        }
        .header-description {
            font-size: 1.1rem;
            color: #7f8c8d;
            max-width: 700px;
            margin: 0 auto;
        }
        .icon-badge {
            width: 40px;
            height: 40px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            margin-right: 15px;
            background-color: #007bff;
            color: white;
            font-size: 1.2rem;
        }
    </style>
</head>
<body>
    <nav class="navbar navbar-expand-lg navbar-dark bg-primary">
        <div class="container">
            <a class="navbar-brand" href="/">
                <i class="fas fa-book"></i> 图书商城管理
            </a>
            <div class="navbar-nav ms-auto">
                <a class="nav-link text-white" href="/login">
                    <i class="fas fa-sign-in-alt"></i> 登录
                </a>
            </div>
        </div>
    </nav>

    <div class="container mt-5">
        <div class="header-section">
            <h1 class="header-title">
                <i class="fas fa-cogs"></i> 管理员控制面板
            </h1>
            <p class="header-description">
                欢迎使用图书商城管理系统，这里您可以管理所有用户、书籍、订单和反馈。
            </p>
        </div>

        <div class="row">
            <div class="col-md-6 mb-4">
                <div class="card">
                    <div class="card-body">
                        <h5 class="card-title">用户管理</h5>
                        <ul class="list-group">
                            <li class="list-group-item"><a href="/users">查看所有用户</a></li>
                            <li class="list-group-item"><a href="/users/edit/">修改用户</a></li>
                            <li class="list-group-item"><a href="/users/delete/">删除用户</a></li>
                        </ul>
                    </div>
                </div>
            </div>

            <div class="col-md-6 mb-4">
                <div class="card">
                    <div class="card-body">
                        <h5 class="card-title">书籍管理</h5>
                        <ul class="list-group">
                            <li class="list-group-item"><a href="/books">查看所有书籍</a></li>
                            <li class="list-group-item"><a href="/books/add">添加书籍</a></li>
                            <li class="list-group-item"><a href="/books/edit/">修改书籍</a></li>
                            <li class="list-group-item"><a href="/books/delete/">删除书籍</a></li>
                        </ul>
                    </div>
                </div>
            </div>

            <div class="col-md-6 mb-4">
                <div class="card">
                    <div class="card-body">
                        <h5 class="card-title">订单管理</h5>
                        <ul class="list-group">
                            <li class="list-group-item"><a href="/orders">查看所有订单</a></li>
                            <li class="list-group-item"><a href="/orders/delete/">删除订单</a></li>
                        </ul>
                    </div>
                </div>
            </div>

            <div class="col-md-6 mb-4">
                <div class="card">
                    <div class="card-body">
                        <h5 class="card-title">评价管理</h5>
                        <ul class="list-group">
                            <li class="list-group-item"><a href="/comments">查看所有评价</a></li>
                            <li class="list-group-item"><a href="/comments/delete/">删除评价</a></li>
                        </ul>
                    </div>
                </div>
            </div>

            <div class="col-md-6 mb-4">
                <div class="card">
                    <div class="card-body">
                        <h5 class="card-title">反馈管理</h5>
                        <ul class="list-group">
                            <li class="list-group-item"><a href="/feedback">查看所有反馈</a></li>
                            <li class="list-group-item"><a href="/feedback/detail">查看反馈详情</a></li>
                            <li class="list-group-item"><a href="/feedback/delete/">删除反馈</a></li>
                        </ul>
                    </div>
                </div>
            </div>

            <div class="col-md-6 mb-4">
                <div class="card">
                    <div class="card-body">
                        <h5 class="card-title">账户设置</h5>
                        <ul class="list-group">
                            <li class="list-group-item"><a href="/change_password">修改密码</a></li>
                            <li class="list-group-item"><a href="/logout">退出登录</a></li>
                        </ul>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
