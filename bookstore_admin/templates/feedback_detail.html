<!DOCTYPE html>
<html>
<head>
    <title>反馈详情</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/css/bootstrap.min.css">
</head>
<body>
    <nav class="navbar navbar-expand-lg navbar-dark bg-dark">
        <div class="container">
            <a class="navbar-brand" href="/">图书商城管理</a>
            <div class="navbar-nav ms-auto">
                <a class="nav-link" href="/dashboard">首页</a>
                <a class="nav-link" href="/users">用户管理</a>
                <a class="nav-link" href="/books">书籍管理</a>
                <a class="nav-link" href="/orders">订单管理</a>
                <a class="nav-link" href="/comments">评价管理</a>
                <a class="nav-link" href="/feedback">反馈管理</a>
                <a class="nav-link" href="/logout">退出登录</a>
            </div>
        </div>
    </nav>

    <div class="container mt-4">
        <h2>反馈详情</h2>
        
        <div class="card">
            <div class="card-body">
                <h5 class="card-title">{{ feedback.title if feedback.title else '无标题' }}</h5>
                <p class="card-text"><strong>用户:</strong> {{ feedback.user.username if feedback.user else '匿名' }}</p>
                <p class="card-text"><strong>内容:</strong> {{ feedback.content }}</p>
                <p class="card-text"><strong>创建时间:</strong> {{ feedback.created_at.strftime('%Y-%m-%d %H:%M:%S') if feedback.created_at else '未知' }}</p>
            </div>
        </div>
        
        <a href="/feedback" class="btn btn-primary mt-3">返回反馈列表</a>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
