<!DOCTYPE html>
<html>
<head>
    <title>编辑用户</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/css/bootstrap.min.css">
</head>
<body>
    <nav class="navbar navbar-expand-lg navbar-dark bg-dark">
        <div class="container">
            <a class="navbar-brand" href="/">图书商城管理</a>
            <div class="navbar-nav ms-auto">
                <a class="nav-link" href="/dashboard">首页</a>
                <a class="nav-link" href="/users">用户管理</a>
                <a class="nav-link" href="/books">书籍管理</a>
                <a class="nav-link" href="/orders">订单管理</a>
                <a class="nav-link" href="/comments">评价管理</a>
                <a class="nav-link" href="/feedback">反馈管理</a>
                <a class="nav-link" href="/logout">退出登录</a>
            </div>
        </div>
    </nav>

    <div class="container mt-4">
        <h2>编辑用户</h2>
        
        <form method="post" action="/users/edit/{{ user._id }}">
            <div class="mb-3">
                <label for="username" class="form-label">用户名</label>
                <input type="text" class="form-control" id="username" name="username" value="{{ user.username }}" required>
            </div>
            <div class="mb-3">
                <label for="email" class="form-label">邮箱</label>
                <input type="email" class="form-control" id="email" name="email" value="{{ user.email if user.email else '' }}">
            </div>
            <button type="submit" class="btn btn-primary">保存更改</button>
            <a href="/users" class="btn btn-secondary">取消</a>
        </form>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
