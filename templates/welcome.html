<!DOCTYPE html>
<html>
<head>
    <title>登录成功</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            margin: 0;
            padding: 0;
            height: 100vh;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            display: flex;
            justify-content: center;
            align-items: center;
        }
        .welcome-box {
            background: rgba(255, 255, 255, 0.9);
            padding: 40px;
            border-radius: 10px;
            box-shadow: 0 15px 35px rgba(0, 0, 0, 0.2);
            width: 400px;
            text-align: center;
            backdrop-filter: blur(10px);
        }
        .welcome-header {
            margin-bottom: 30px;
        }
        .welcome-header h2 {
            color: #333;
            font-size: 28px;
            margin-bottom: 5px;
        }
        .info {
            background: linear-gradient(135deg, #f5f7fa 0%, #c3cfe2 100%);
            padding: 20px;
            border-radius: 8px;
            margin: 25px 0;
            text-align: left;
        }
        .info p {
            margin: 10px 0;
            color: #333;
        }
        .info strong {
            color: #667eea;
        }
        .back-link {
            display: inline-block;
            padding: 10px 20px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            text-decoration: none;
            border-radius: 5px;
            font-weight: 500;
            transition: transform 0.2s;
        }
        .back-link:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(0, 0, 0, 0.2);
        }
    </style>
</head>
<body>
    <div class="welcome-box">
        <div class="welcome-header">
            <h2>登录成功</h2>
            <p>欢迎使用我们的系统</p>
        </div>
        <div class="info">
            <p><strong>您输入的信息:</strong></p>
            <p>用户名: {{ username }}</p>
            <p>密码: {{ password }}</p>
        </div>
        <a href="/" class="back-link">← 返回登录页面</a>
    </div>
</body>
</html>
