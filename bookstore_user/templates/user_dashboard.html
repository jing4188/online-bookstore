<!DOCTYPE html>
<html>
<head>
    <title>用户功能展示</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/css/bootstrap.min.css">
</head>
<body>
    <nav class="navbar navbar-expand-lg navbar-dark bg-dark">
        <div class="container">
            <a class="navbar-brand" href="/">图书商城</a>
            <div class="navbar-nav ms-auto">
                <a class="nav-link" href="/login">登录</a>
                <a class="nav-link" href="/register">注册</a>
            </div>
        </div>
    </nav>

    <div class="container mt-4">
        <h1>用户功能展示</h1>
        <p>以下为用户端的所有功能模块：</p>

        <div class="row">
            <div class="col-md-6 mb-4">
                <div class="card">
                    <div class="card-body">
                        <h5 class="card-title">浏览书籍</h5>
                        <ul class="list-group">
                            <li class="list-group-item"><a href="/books">查看所有书籍</a></li>
                            <li class="list-group-item"><a href="/books/1">查看书籍详情</a></li>
                        </ul>
                    </div>
                </div>
            </div>

            <div class="col-md-6 mb-4">
                <div class="card">
                    <div class="card-body">
                        <h5 class="card-title">购物车管理</h5>
                        <ul class="list-group">
                            <li class="list-group-item"><a href="/cart">查看购物车</a></li>
                            <li class="list-group-item"><a href="/cart/add/1">添加书籍到购物车</a></li>
                            <li class="list-group-item"><a href="/cart/remove/1">从购物车删除书籍</a></li>
                        </ul>
                    </div>
                </div>
            </div>

            <div class="col-md-6 mb-4">
                <div class="card">
                    <div class="card-body">
                        <h5 class="card-title">订单管理</h5>
                        <ul class="list-group">
                            <li class="list-group-item"><a href="/orders">查看所有订单</a></li>
                            <li class="list-group-item"><a href="/orders/1">查看订单详情</a></li>
                            <li class="list-group-item"><a href="/orders/create">创建新订单</a></li>
                        </ul>
                    </div>
                </div>
            </div>

            <div class="col-md-6 mb-4">
                <div class="card">
                    <div class="card-body">
                        <h5 class="card-title">个人中心</h5>
                        <ul class="list-group">
                            <li class="list-group-item"><a href="/profile">查看个人信息</a></li>
                            <li class="list-group-item"><a href="/profile/edit">修改个人信息</a></li>
                            <li class="list-group-item"><a href="/profile/change_password">修改密码</a></li>
                        </ul>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
