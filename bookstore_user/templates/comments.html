<!DOCTYPE html>
<html>
<head>
    <title>评价列表</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/css/bootstrap.min.css">
</head>
<body>
    <nav class="navbar navbar-expand-lg navbar-dark bg-dark">
        <div class="container">
            <a class="navbar-brand" href="/">图书商城</a>
            <div class="navbar-nav ms-auto">
                <a class="nav-link" href="/dashboard">首页</a>
                <a class="nav-link" href="/books">图书列表</a>
                <a class="nav-link" href="/cart">购物车</a>
                <a class="nav-link" href="/profile">个人中心</a>
                <a class="nav-link" href="/logout">退出登录</a>
            </div>
        </div>
    </nav>

    <div class="container mt-4">
        <h1>评价列表</h1>
        <div class="row">
            {% for comment in comments %}
            <div class="col-md-6 mb-4">
                <div class="card">
                    <div class="card-body">
                        <h5 class="card-title">{{ comment.user.username }}</h5>
                        <div class="rating">
                            {% for i in range(comment.rating) %}
                                <span class="text-warning">★</span>
                            {% endfor %}
                            {% for i in range(5 - comment.rating) %}
                                <span class="text-muted">☆</span>
                            {% endfor %}
                        </div>
                        <p class="card-text">{{ comment.content }}</p>
                        <small class="text-muted">{{ comment.created_at.strftime('%Y-%m-%d %H:%M') }}</small>
                    </div>
                </div>
            </div>
            {% endfor %}
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
