<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{{ book.title }} - 图书详情</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>
<body>
    {% include 'base.html' %}
    
    <div class="container">
        <div class="page-header">
            <h1><i class="fas fa-book"></i> {{ book.title }}</h1>
            <p class="lead">作者: {{ book.author }}</p>
        </div>
        
        <div class="row">
            <div class="col-md-4">
                <div class="card">
                    <div class="card-body">
                        <img src="{{ book.image if book.image else '/static/images/default-book.jpg' }}" alt="{{ book.title }}" class="img-fluid rounded">
                    </div>
                </div>
            </div>
            
            <div class="col-md-8">
                <div class="card">
                    <div class="card-body">
                        <h5 class="card-title">图书信息</h5>
                        <div class="mb-3">
                            <strong>价格:</strong> <span class="text-danger">¥{{ book.price }}</span>
                        </div>
                        <div class="mb-3">
                            <strong>库存:</strong> {{ book.stock }} 本
                        </div>
                        <div class="mb-3">
                            <strong>简介:</strong>
                            <p>{{ book.description }}</p>
                        </div>
                        
                        <!-- 购买选项 -->
                        <form method="POST" action="/add_to_cart/{{ book._id }}">
                            <div class="input-group mb-3">
                                <label for="quantity" class="input-group-text">数量:</label>
                                <input type="number" name="quantity" id="quantity" class="form-control" value="1" min="1" max="{{ book.stock }}" required>
                                <button type="submit" class="btn btn-success"><i class="fas fa-cart-plus"></i> 加入购物车</button>
                            </div>
                        </form>
                        
                        <!-- 返回按钮 -->
                        <a href="/dashboard" class="btn btn-outline-secondary"><i class="fas fa-arrow-left"></i> 返回图书列表</a>
                    </div>
                </div>
            </div>
        </div>
    </div>
</body>
</html>
