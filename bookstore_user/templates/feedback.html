<!DOCTYPE html>
<html>
<head>
    <title>提交反馈</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/css/bootstrap.min.css">
</head>
<body>
    <nav class="navbar navbar-expand-lg navbar-dark bg-dark">
        <div class="container">
            <a class="navbar-brand" href="/dashboard">图书商城</a>
            <div class="navbar-nav ms-auto">
                <a class="nav-link" href="/dashboard">首页</a>
                <a class="nav-link" href="/books">书籍</a>
                <a class="nav-link" href="/cart">购物车</a>
                <a class="nav-link" href="/orders">订单</a>
                <a class="nav-link" href="/profile">个人中心</a>
                <a class="nav-link" href="/feedback">反馈</a>
                <a class="nav-link" href="/logout">退出</a>
            </div>
        </div>
    </nav>

    <div class="container mt-4">
        <h2>提交反馈</h2>
        
        <form method="post" action="/feedback">
            <div class="mb-3">
                <label for="title" class="form-label">标题（可选）</label>
                <input type="text" class="form-control" id="title" name="title">
            </div>
            <div class="mb-3">
                <label for="content" class="form-label">内容</label>
                <textarea class="form-control" id="content" name="content" rows="5" required></textarea>
            </div>
            <button type="submit" class="btn btn-primary">提交反馈</button>
            <a href="/dashboard" class="btn btn-secondary">返回首页</a>
        </form>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
